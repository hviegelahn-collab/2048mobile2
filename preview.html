<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Game</title>
<style>
    :root {
        --bg-color: #f5f0e6; /* Beige background */
        --tile-bg: #cdc1b4;
        --tile-text: #776e65;
        --tile-colors: #eee4da #ede0c8 #f2b179 #f59563 #f67c5f #f65e3b #edcf72 #edcc61 #edc850 #edc53f;
    }
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: var(--bg-color);
        font-family: 'Arial', sans-serif;
    }
    body {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .container {
        max-width: 500px;
        width: 90vw;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    h1 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 2rem;
        color: #776e65;
    }
    .game-container {
        background-color: #bbada0;
        border-radius: 10px;
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        width: 100%;
    }
    .tile {
        background-color: var(--tile-bg);
        border-radius: 5px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2rem;
        font-weight: bold;
        color: var(--tile-text);
        aspect-ratio: 1 / 1; /* Makes perfect square */
        transition: all 0.2s ease-in-out;
    }
    .tile span {
        text-align: center;
    }
    .controls {
        margin: 15px 0;
        text-align: center;
    }
    .controls button {
        padding: 8px 15px;
        font-size: 1rem;
        margin: 0 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background-color: #f2b179;
        color: white;
    }
    @media (max-width: 500px) {
        h1 { font-size: 1.5rem; }
        .tile { font-size: 1.5rem; }
    }
</style>
</head>
<body>

<div class="container">
    <h1>2048</h1>
    <div class="controls">
        <button class="restart-btn">Restart</button>
    </div>
    <div class="game-container" id="game-container"></div>
</div>

<script>
const gameContainer = document.getElementById('game-container');
let board = Array(16).fill(0);

// Initialize tiles
function initBoard() {
    board.fill(0);
    addRandomTile();
    addRandomTile();
    renderBoard();
}

// Add new random tile
function addRandomTile() {
    let empty = [];
    board.forEach((val, idx) => { if(val === 0) empty.push(idx); });
    if(empty.length === 0) return;
    let pos = empty[Math.floor(Math.random() * empty.length)];
    board[pos] = Math.random() < 0.9 ? 2 : 4;
}

// Render the board
function renderBoard() {
    gameContainer.innerHTML = '';
    board.forEach(value => {
        const tile = document.createElement('div');
        tile.classList.add('tile');
        if(value > 0) {
            tile.style.backgroundColor = getTileColor(value);
            tile.innerHTML = `<span>${value}</span>`;
        }
        gameContainer.appendChild(tile);
    });
}

// Get color for tile
function getTileColor(value) {
    const colors = getComputedStyle(document.documentElement).getPropertyValue('--tile-colors').trim().split(' ');
    let idx = Math.min(Math.log2(value) - 1, colors.length - 1);
    return colors[idx];
}

// Move logic
function move(dir) {
    let rotated = dir === 'up' || dir === 'down';
    let reversed = dir === 'right' || dir === 'down';
    let newBoard = [...board];

    function compress(row) {
        let arr = row.filter(x => x !== 0);
        for(let i=0;i<arr.length-1;i++){
            if(arr[i]===arr[i+1]){
                arr[i]*=2;
                arr[i+1]=0;
            }
        }
        return arr.filter(x=>x!==0).concat(Array(row.length).fill(0)).slice(0,row.length);
    }

    for(let i=0;i<4;i++){
        let row = [];
        for(let j=0;j<4;j++){
            let idx = rotated ? j*4 + i : i*4 + j;
            row.push(newBoard[idx]);
        }
        if(reversed) row.reverse();
        row = compress(row);
        if(reversed) row.reverse();
        for(let j=0;j<4;j++){
            let idx = rotated ? j*4 + i : i*4 + j;
            newBoard[idx] = row[j];
        }
    }

    if(board.toString() !== newBoard.toString()){
        board = newBoard;
        addRandomTile();
        renderBoard();
    }
}

// Keyboard input
document.addEventListener('keydown', e => {
    if(e.key === 'ArrowUp') move('up');
    if(e.key === 'ArrowDown') move('down');
    if(e.key === 'ArrowLeft') move('left');
    if(e.key === 'ArrowRight') move('right');
});

// Swipe input for mobile
let touchStartX = 0, touchStartY = 0;
gameContainer.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});
gameContainer.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].clientX - touchStartX;
    let dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > Math.abs(dy)){
        if(dx > 30) move('right');
        else if(dx < -30) move('left');
    } else {
        if(dy > 30) move('down');
        else if(dy < -30) move('up');
    }
});

// Restart button
document.querySelector('.restart-btn').addEventListener('click', initBoard);

initBoard();
</script>

</body>
</html>
